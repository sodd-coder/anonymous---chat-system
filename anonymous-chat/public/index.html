<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>AnonChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#08080f;--surface:#0f0f1a;--surface2:#16162a;--border:rgba(255,255,255,0.07);--accent:#7c6aff;--accent2:#ff6ab0;--accent3:#6affda;--text:#f0f0ff;--muted:#6b6b8a}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px}
    .bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:blobFloat 8s ease-in-out infinite}
    .blob1{width:350px;height:350px;background:var(--accent);top:-100px;left:-100px}
    .blob2{width:280px;height:280px;background:var(--accent2);bottom:-80px;right:-80px;animation-delay:3s}
    .blob3{width:220px;height:220px;background:var(--accent3);top:50%;left:50%;animation-delay:5s}
    @keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-20px) scale(1.05)}66%{transform:translate(-15px,15px) scale(.95)}}
    .card{position:relative;z-index:1;background:rgba(15,15,26,.9);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:24px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 0 1px rgba(124,106,255,.1)}
    .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .logo-badge{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 6px 20px rgba(124,106,255,.4);flex-shrink:0}
    .logo-text{font-size:20px;font-weight:700;letter-spacing:-.5px}
    .logo-text span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .tagline{font-size:13px;color:var(--muted);margin-bottom:32px;line-height:1.5}
    .btn-create{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;margin-bottom:18px;transition:transform .15s,box-shadow .15s,opacity .2s;box-shadow:0 8px 28px rgba(124,106,255,.35);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .btn-create:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(124,106,255,.5)}
    .btn-create:active{transform:scale(.98);opacity:.9}
    .btn-create:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .divider span{font-size:12px;color:var(--muted);white-space:nowrap}
    .input-wrap{margin-bottom:12px}
    .input-wrap input{width:100%;padding:14px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-size:16px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:3px;text-transform:uppercase;-webkit-appearance:none;appearance:none}
    .input-wrap input::placeholder{letter-spacing:0;text-transform:none;color:var(--muted);font-size:14px}
    .input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,106,255,.12)}
    .btn-join{width:100%;padding:14px;background:var(--surface2);color:var(--accent);border:1.5px solid rgba(124,106,255,.3);border-radius:14px;font-size:15px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .btn-join:hover{background:rgba(124,106,255,.1);border-color:var(--accent)}
    .btn-join:active{transform:scale(.98);opacity:.9}
    .btn-join:disabled{opacity:.5;cursor:not-allowed}
    .msg{font-size:12px;margin-top:10px;text-align:center;display:none;padding:8px 12px;border-radius:10px}
    .msg.error{color:#ff6b6b;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2)}
    .msg.loading{color:var(--accent);background:rgba(124,106,255,.08);border:1px solid rgba(124,106,255,.2)}
    .pills{display:flex;justify-content:center;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);flex-wrap:wrap}
    .pill{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:4px}
    .pill-dot{width:5px;height:5px;border-radius:50%;background:var(--accent3)}
    .back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;font-size:12px;color:var(--muted);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--text)}
  </style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>
<div class="card">
  <div class="logo-row">
    <div class="logo-badge">🔐</div>
    <div class="logo-text">Anon<span>Chat</span></div>
  </div>
  <p class="tagline">No accounts. No logs. No traces. Just vibes. 🌐</p>
  <button class="btn-create" id="createBtn" onclick="createRoom()">✦ Create New Room</button>
  <div class="divider"><span>or drop a code</span></div>
  <div class="input-wrap">
    <input type="text" id="roomCodeInput" placeholder="Enter room code..."
      maxlength="6" autocomplete="off" autocorrect="off"
      autocapitalize="characters" spellcheck="false"/>
  </div>
  <button class="btn-join" id="joinBtn" onclick="joinRoom()">Join Room →</button>
  <div class="msg error" id="errorMsg"></div>
  <div class="msg loading" id="loadingMsg"></div>
  <div class="pills">
    <div class="pill"><div class="pill-dot"></div>Anonymous</div>
    <div class="pill"><div class="pill-dot"></div>Encrypted</div>
    <div class="pill"><div class="pill-dot"></div>Zero Logs</div>
  </div>
  <a href="/" class="back-link">← Back to home</a>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let busy = false;

  function generateUsername() {
    const adj = ['Silent','Ghost','Shadow','Anon','Stealth','Phantom','Cipher','Mystic','Neon','Glitch'];
    const noun = ['Fox','Wolf','Hawk','Bear','Lynx','Raven','Tiger','Eagle','Vibe','Pixel'];
    return adj[Math.floor(Math.random()*adj.length)] + noun[Math.floor(Math.random()*noun.length)] + Math.floor(10+Math.random()*90);
  }

  function lock() {
    busy = true;
    document.getElementById('createBtn').disabled = true;
    document.getElementById('joinBtn').disabled = true;
  }

  function unlock() {
    busy = false;
    document.getElementById('createBtn').disabled = false;
    document.getElementById('joinBtn').disabled = false;
  }

  function showError(msg) {
    unlock();
    const e = document.getElementById('errorMsg');
    e.textContent = msg; e.style.display = 'block';
    document.getElementById('loadingMsg').style.display = 'none';
  }

  function showLoading(msg) {
    document.getElementById('errorMsg').style.display = 'none';
    const l = document.getElementById('loadingMsg');
    l.textContent = msg; l.style.display = 'block';
  }

  function hideAll() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('loadingMsg').style.display = 'none';
  }

  function redirect(roomCode, isCreator) {
    sessionStorage.setItem('username', generateUsername());
    sessionStorage.setItem('roomCode', roomCode);
    sessionStorage.setItem('isCreator', isCreator ? 'true' : 'false');
    window.location.href = '/chat.html';
  }

  // ── CREATE ──
  function createRoom() {
    if (busy) return;
    lock(); hideAll(); showLoading('⏳ Creating room...');
    socket.emit('generate-code');
  }

  socket.on('code-generated', (roomCode) => {
    redirect(roomCode, true);
  });

  // ── JOIN ──
  function joinRoom() {
    if (busy) return;
    const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
    if (!code) return showError('Please enter a room code.');
    if (code.length < 6) return showError('Room code must be 6 characters.');
    lock(); hideAll(); showLoading('⏳ Checking room...');
    socket.emit('check-room', { roomCode: code });
  }

  socket.on('room-valid', () => {
    const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
    redirect(code, false);
  });

  socket.on('join-error', (msg) => showError(msg));

  // Input helpers
  document.getElementById('roomCodeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
  document.getElementById('roomCodeInput').addEventListener('input', e => {
    hideAll();
    const pos = e.target.selectionStart;
    e.target.value = e.target.value.toUpperCase();
    e.target.setSelectionRange(pos, pos);
  });

  // Auto fill room code from QR scan
const urlParams = new URLSearchParams(window.location.search);
const qrCode = urlParams.get('code');
if (qrCode) {
  document.getElementById('roomCodeInput').value = qrCode.toUpperCase();
}

</script>
</body>
</html>
