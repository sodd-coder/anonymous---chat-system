<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AnonChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(0,255,150,0.08) 0%, transparent 70%);
    }
    .card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      padding: 44px 40px;
      border-radius: 20px;
      width: 380px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #00ff96, #00c8ff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 20px; font-weight: 700; }
    .subtitle { font-size: 13px; color: #555; margin-bottom: 32px; }
    .btn-create {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #00ff96, #00c8ff);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 20px;
    }
    .btn-create:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-create:active { transform: translateY(0); }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.08);
    }
    .divider span { font-size: 12px; color: #444; }
    .input-group { position: relative; margin-bottom: 12px; }
    .input-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .input-group input:focus {
      outline: none;
      border-color: rgba(0,255,150,0.4);
    }
    .input-group input::placeholder { letter-spacing: 0; text-transform: none; color: #444; }
    .btn-join {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #00ff96;
      border: 1px solid rgba(0,255,150,0.3);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-join:hover {
      background: rgba(0,255,150,0.08);
      border-color: #00ff96;
      transform: translateY(-1px);
    }
    .error {
      color: #ff4f4f;
      font-size: 12px;
      margin-top: 10px;
      display: none;
      text-align: center;
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .feature { font-size: 11px; color: #444; display: flex; align-items: center; gap: 5px; }
    .feature span { color: #00ff96; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔒</div>
      <h1>AnonChat</h1>
    </div>
    <p class="subtitle">Private rooms. No accounts. No logs. No trace.</p>

    <button class="btn-create" onclick="createRoom()">+ Create New Room</button>

    <div class="divider"><span>or join with a code</span></div>

    <div class="input-group">
      <input type="text" id="roomCodeInput" placeholder="Enter room code" maxlength="6" />
    </div>
    <button class="btn-join" onclick="joinRoom()">Join Room →</button>
    <div class="error" id="errorMsg"></div>

    <div class="features">
      <div class="feature"><span>✦</span> Anonymous</div>
      <div class="feature"><span>✦</span> No Storage</div>
      <div class="feature"><span>✦</span> Encrypted</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    function generateUsername() {
      const adjectives = ['Silent','Ghost','Shadow','Anon','Stealth','Phantom','Cipher','Mystic'];
      const nouns = ['Fox','Wolf','Hawk','Bear','Lynx','Raven','Tiger','Eagle'];
      const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
      const noun = nouns[Math.floor(Math.random() * nouns.length)];
      const num = Math.floor(10 + Math.random() * 90);
      return `${adj}${noun}${num}`;
    }

    function createRoom() {
      socket.emit('create-room');
    }

    socket.on('room-created', (roomCode) => {
      const username = generateUsername();
      sessionStorage.setItem('username', username);
      sessionStorage.setItem('roomCode', roomCode);
      window.location.href = '/chat.html';
    });

    function joinRoom() {
      const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
      if (!code) return showError('Please enter a room code.');
      if (code.length < 6) return showError('Room code must be 6 characters.');
      const username = generateUsername();
      sessionStorage.setItem('username', username);
      sessionStorage.setItem('roomCode', code);
      socket.emit('join-room', { roomCode: code, username });
    }

    socket.on('join-success', () => {
      window.location.href = '/chat.html';
    });

    socket.on('join-error', (msg) => showError(msg));

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('roomCodeInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinRoom();
    });
  </script>
</body>
</html>
