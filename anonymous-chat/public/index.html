<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnonChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080f;
      --surface: #0f0f1a;
      --surface2: #16162a;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6aff;
      --accent2: #ff6ab0;
      --accent3: #6affda;
      --text: #f0f0ff;
      --muted: #6b6b8a;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg-blobs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .blob2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 3s; }
    .blob3 { width: 250px; height: 250px; background: var(--accent3); top: 50%; left: 50%; animation-delay: 5s; }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(15, 15, 26, 0.85);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 40px;
      width: 400px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,106,255,0.1);
    }

    .logo-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
    }
    .logo-badge {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 8px 24px rgba(124,106,255,0.4);
    }
    .logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-text span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .tagline {
      font-size: 13px; color: var(--muted); margin-bottom: 36px; line-height: 1.5;
    }

    .btn-create {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 16px;
      font-size: 15px; font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer; margin-bottom: 20px;
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 8px 32px rgba(124,106,255,0.35);
      letter-spacing: 0.3px;
    }
    .btn-create::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-create:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(124,106,255,0.5); }
    .btn-create:hover::before { opacity: 1; }
    .btn-create:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .input-wrap { position: relative; margin-bottom: 12px; }
    .input-wrap input {
      width: 100%; padding: 14px 18px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px; color: var(--text);
      font-size: 15px; font-family: 'Space Grotesk', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 3px; text-transform: uppercase;
    }
    .input-wrap input::placeholder { letter-spacing: 0; text-transform: none; color: var(--muted); font-size: 14px; }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124,106,255,0.12);
    }

    .btn-join {
      width: 100%; padding: 14px;
      background: var(--surface2);
      color: var(--accent); border: 1.5px solid rgba(124,106,255,0.3);
      border-radius: 14px; font-size: 15px; font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-join:hover { background: rgba(124,106,255,0.1); border-color: var(--accent); transform: translateY(-1px); }

    .error { color: #ff6b6b; font-size: 12px; margin-top: 10px; text-align: center; display: none; }

    .pills {
      display: flex; justify-content: center; gap: 10px;
      margin-top: 28px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .pill {
      font-size: 11px; color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
      display: flex; align-items: center; gap: 4px;
    }
    .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent3); }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <div class="card">
    <div class="logo-row">
      <div class="logo-badge">🔐</div>
      <div class="logo-text">Anon<span>Chat</span></div>
    </div>
    <p class="tagline">No accounts. No logs. No traces. Just vibes. 🌐</p>

    <button class="btn-create" onclick="createRoom()">✦ Create New Room</button>

    <div class="divider"><span>or drop a code</span></div>

    <div class="input-wrap">
      <input type="text" id="roomCodeInput" placeholder="Enter room code..." maxlength="6" />
    </div>
    <button class="btn-join" onclick="joinRoom()">Join Room →</button>
    <div class="error" id="errorMsg"></div>

    <div class="pills">
      <div class="pill"><div class="pill-dot"></div> Anonymous</div>
      <div class="pill"><div class="pill-dot"></div> Encrypted</div>
      <div class="pill"><div class="pill-dot"></div> Zero Logs</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    function generateUsername() {
      const adj = ['Silent','Ghost','Shadow','Anon','Stealth','Phantom','Cipher','Mystic','Neon','Glitch'];
      const noun = ['Fox','Wolf','Hawk','Bear','Lynx','Raven','Tiger','Eagle','Vibe','Pixel'];
      return adj[Math.floor(Math.random()*adj.length)] + noun[Math.floor(Math.random()*noun.length)] + Math.floor(10+Math.random()*90);
    }

    function createRoom() { socket.emit('create-room'); }

    socket.on('room-created', (roomCode) => {
      const username = generateUsername();
      sessionStorage.setItem('username', username);
      sessionStorage.setItem('roomCode', roomCode);
      sessionStorage.setItem('isCreator', 'true');
      window.location.href = '/chat.html';
    });

    function joinRoom() {
      const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
      if (!code) return showError('Please enter a room code.');
      if (code.length < 6) return showError('Room code must be 6 characters.');
      const username = generateUsername();
      sessionStorage.setItem('username', username);
      sessionStorage.setItem('roomCode', code);
      sessionStorage.setItem('isCreator', 'false');
      socket.emit('join-room', { roomCode: code, username });
    }

    socket.on('join-success', () => { window.location.href = '/chat.html'; });
    socket.on('join-error', (msg) => showError(msg));

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.style.display = 'block';
    }

    document.getElementById('roomCodeInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
  </script>
</body>
</html>
