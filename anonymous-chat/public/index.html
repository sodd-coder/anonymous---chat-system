<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>AnonChat — Start Chatting</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#070711;--surface:#0e0e1c;--surface2:#151528;--surface3:#1c1c35;
      --border:rgba(255,255,255,0.06);--accent:#8b5cf6;--accent2:#ec4899;
      --accent3:#06d6a0;--text:#f1f0ff;--muted:#6b6b8a;
    }
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
    .bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.1;animation:blobFloat 9s ease-in-out infinite}
    .b1{width:400px;height:400px;background:var(--accent);top:-150px;left:-150px}
    .b2{width:300px;height:300px;background:var(--accent2);bottom:-100px;right:-100px;animation-delay:3s}
    .b3{width:250px;height:250px;background:var(--accent3);top:40%;left:40%;animation-delay:6s}
    @keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-25px) scale(1.06)}66%{transform:translate(-18px,18px) scale(.94)}}

    .card{position:relative;z-index:1;background:rgba(14,14,28,.92);backdrop-filter:blur(32px);border:1px solid var(--border);border-radius:26px;padding:32px 28px;width:100%;max-width:430px;box-shadow:0 40px 100px rgba(0,0,0,.7),0 0 0 1px rgba(139,92,246,.08)}

    /* Header */
    .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .logo-badge{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 6px 20px rgba(139,92,246,.4);flex-shrink:0}
    .logo-text{font-size:19px;font-weight:700;letter-spacing:-.5px}
    .logo-text span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .tagline{font-size:12px;color:var(--muted);margin-bottom:22px;line-height:1.5}

    /* Fields */
    .field-label{font-size:10px;color:var(--muted);margin-bottom:6px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .field-input{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-size:15px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
    .field-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(139,92,246,.1)}
    .field-input::placeholder{color:var(--muted);font-size:13px}
    .field-hint{font-size:10px;color:var(--muted);margin-top:4px;margin-bottom:18px}
    .field-hint span{color:var(--accent3);cursor:pointer;text-decoration:underline}

    /* Room type grid */
    .type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:18px}
    .tc{padding:10px 4px;background:var(--surface2);border:1.5px solid var(--border);border-radius:13px;cursor:pointer;text-align:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .tc:hover{border-color:var(--accent);background:rgba(139,92,246,.08)}
    .tc.sel{border-color:var(--accent);background:rgba(139,92,246,.15)}
    .tc .em{font-size:18px;display:block;margin-bottom:3px}
    .tc .nm{font-size:9px;font-weight:600;color:var(--text);display:block}
    .tc .ds{font-size:8px;color:var(--muted);display:block;margin-top:1px;line-height:1.3}

    /* Buttons */
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;margin-bottom:16px;transition:transform .15s,box-shadow .15s,opacity .15s;box-shadow:0 8px 28px rgba(139,92,246,.35);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(139,92,246,.5)}
    .btn-primary:active{transform:scale(.98);opacity:.9}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-secondary{width:100%;padding:13px;background:var(--surface2);color:var(--accent);border:1.5px solid rgba(139,92,246,.3);border-radius:14px;font-size:15px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .btn-secondary:hover{background:rgba(139,92,246,.1);border-color:var(--accent)}
    .btn-secondary:active{transform:scale(.98);opacity:.9}
    .btn-secondary:disabled{opacity:.5;cursor:not-allowed}

    /* Divider */
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .divider span{font-size:11px;color:var(--muted);white-space:nowrap}

    /* Code input */
    .code-input{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-size:18px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:5px;text-transform:uppercase;text-align:center;-webkit-appearance:none;margin-bottom:12px;font-weight:700}
    .code-input::placeholder{letter-spacing:0;text-transform:none;color:var(--muted);font-size:13px;font-weight:400;text-align:center}
    .code-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(139,92,246,.1)}

    /* Recent rooms */
    .section-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
    .recent-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
    .recent-item{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .recent-item:hover{border-color:var(--accent);background:rgba(139,92,246,.05)}
    .ri-left{display:flex;align-items:center;gap:10px}
    .ri-emoji{font-size:18px}
    .ri-code{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:2px}
    .ri-info{font-size:10px;color:var(--muted);margin-top:1px}
    .ri-action{font-size:11px;color:var(--accent3);font-weight:600}

    /* Feedback */
    .fb{font-size:12px;margin-top:8px;text-align:center;display:none;padding:8px 12px;border-radius:11px}
    .fb.err{color:#f87171;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18)}
    .fb.load{color:var(--accent);background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.18)}

    /* Pills */
    .pills{display:flex;justify-content:center;gap:6px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
    .pill{font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:3px}
    .pill-dot{width:4px;height:4px;border-radius:50%;background:var(--accent3)}
    .back-link{display:flex;align-items:center;justify-content:center;margin-top:14px;font-size:11px;color:var(--muted);text-decoration:none;transition:color .2s;gap:4px}
    .back-link:hover{color:var(--text)}
  </style>
</head>
<body>
<div class="bg-blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="card">
  <div class="logo-row">
    <div class="logo-badge">🔐</div>
    <div class="logo-text">Anon<span>Chat</span></div>
  </div>
  <p class="tagline">no name. no face. no trace. just ghost. 👻</p>

  <label class="field-label">Your nickname (optional)</label>
  <input type="text" id="nickInput" class="field-input" placeholder="Leave blank for random name..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false"/>
  <div class="field-hint">or <span onclick="genRandom()">generate a random one</span></div>

  <label class="field-label">Room type</label>
  <div class="type-grid">
    <div class="tc sel" data-type="normal" onclick="pickType('normal')"><span class="em">💬</span><span class="nm">Normal</span><span class="ds">Standard</span></div>
    <div class="tc" data-type="vanish" onclick="pickType('vanish')"><span class="em">🔥</span><span class="nm">Vanish</span><span class="ds">30s delete</span></div>
    <div class="tc" data-type="rapid" onclick="pickType('rapid')"><span class="em">⚡</span><span class="nm">Rapid</span><span class="ds">100 chars</span></div>
    <div class="tc" data-type="confession" onclick="pickType('confession')"><span class="em">🎭</span><span class="nm">Confess</span><span class="ds">No names</span></div>
    <div class="tc" data-type="study" onclick="pickType('study')"><span class="em">📚</span><span class="nm">Study</span><span class="ds">+Prompts</span></div>
  </div>

  <button class="btn-primary" id="createBtn" onclick="createRoom()">✦ Create New Room</button>

  <div class="divider"><span>or join with a code</span></div>

  <input type="text" id="codeInput" class="code-input" placeholder="ENTER CODE" maxlength="6" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
  <button class="btn-secondary" id="joinBtn" onclick="joinRoom()">Join Room →</button>

  <div id="recentSection" style="display:none;margin-top:18px">
    <span class="section-label">Recent rooms</span>
    <div class="recent-list" id="recentList"></div>
  </div>

  <div class="fb err" id="errMsg"></div>
  <div class="fb load" id="loadMsg"></div>

  <div class="pills">
    <div class="pill"><div class="pill-dot"></div>Anonymous</div>
    <div class="pill"><div class="pill-dot"></div>Encrypted</div>
    <div class="pill"><div class="pill-dot"></div>Zero Logs</div>
  </div>
  <a href="/" class="back-link">← Back to home</a>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let busy = false;
  let selectedType = 'normal';

  const ADJS = ['Silent','Ghost','Shadow','Anon','Stealth','Phantom','Cipher','Mystic','Neon','Glitch','Blaze','Void','Dark','Pixel','Fuzzy'];
  const NOUNS = ['Fox','Wolf','Hawk','Bear','Lynx','Raven','Tiger','Eagle','Vibe','Comet','Nova','Storm','Quasar','Byte','Spark'];
  const TYPE_EMOJI = { normal:'💬', vanish:'🔥', rapid:'⚡', confession:'🎭', study:'📚' };

  function rndName() { return ADJS[Math.random()*ADJS.length|0]+NOUNS[Math.random()*NOUNS.length|0]+(10+Math.random()*90|0); }
  function getUsername() { const v=document.getElementById('nickInput').value.trim().replace(/[^a-zA-Z0-9_]/g,'').substring(0,20); return v||rndName(); }
  function genRandom() { document.getElementById('nickInput').value = rndName(); }

  function pickType(t) {
    selectedType = t;
    document.querySelectorAll('.tc').forEach(c => c.classList.toggle('sel', c.dataset.type === t));
  }

  // Recent rooms
  function loadRecent() {
    try {
      const arr = JSON.parse(localStorage.getItem('ac_recent')||'[]').filter(r => Date.now()-r.t < 7200000);
      if (!arr.length) return;
      document.getElementById('recentSection').style.display = 'block';
      const list = document.getElementById('recentList');
      list.innerHTML = '';
      arr.slice(0,3).forEach(r => {
        const el = document.createElement('div');
        el.className = 'recent-item';
        const mins = Math.floor((Date.now()-r.t)/60000);
        el.innerHTML = `<div class="ri-left"><span class="ri-emoji">${r.em||'💬'}</span><div><div class="ri-code">${r.code}</div><div class="ri-info">${r.type} · ${mins<1?'just now':mins+'m ago'}</div></div></div><span class="ri-action">Rejoin →</span>`;
        el.onclick = () => { document.getElementById('codeInput').value=r.code; joinRoom(); };
        list.appendChild(el);
      });
    } catch(e) {}
  }

  function saveRecent(code, type) {
    try {
      const arr = JSON.parse(localStorage.getItem('ac_recent')||'[]').filter(r=>r.code!==code);
      arr.unshift({ code, type, em: TYPE_EMOJI[type]||'💬', t: Date.now() });
      localStorage.setItem('ac_recent', JSON.stringify(arr.slice(0,5)));
    } catch(e) {}
  }

  loadRecent();

  function lock() { busy=true; ['createBtn','joinBtn'].forEach(id=>document.getElementById(id).disabled=true); }
  function unlock() { busy=false; ['createBtn','joinBtn'].forEach(id=>document.getElementById(id).disabled=false); }
  function showErr(m) { unlock(); const e=document.getElementById('errMsg'); e.textContent=m; e.style.display='block'; document.getElementById('loadMsg').style.display='none'; }
  function showLoad(m) { document.getElementById('errMsg').style.display='none'; const l=document.getElementById('loadMsg'); l.textContent=m; l.style.display='block'; }
  function clearFb() { ['errMsg','loadMsg'].forEach(id=>document.getElementById(id).style.display='none'); }

  function redirect(code, isCreator, type) {
    sessionStorage.setItem('ac_user', getUsername());
    sessionStorage.setItem('ac_room', code);
    sessionStorage.setItem('ac_creator', isCreator?'1':'0');
    sessionStorage.setItem('ac_type', type||'normal');
    saveRecent(code, type||'normal');
    window.location.href = '/chat';
  }

  function createRoom() {
    if (busy) return;
    lock(); clearFb(); showLoad('⏳ Creating room...');
    socket.emit('generate-code');
  }
  socket.on('code-generated', code => redirect(code, true, selectedType));

  function joinRoom() {
    if (busy) return;
    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    if (!code) return showErr('Please enter a room code.');
    if (code.length < 6) return showErr('Code must be 6 characters.');
    lock(); clearFb(); showLoad('⏳ Checking room...');
    socket.emit('check-room', { roomCode: code });
  }
  socket.on('room-valid', ({ roomType }) => {
    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    redirect(code, false, roomType);
  });
  socket.on('join-error', m => showErr(m));
  socket.on('temp-blocked', m => showErr('🚫 ' + m));

  document.getElementById('codeInput').addEventListener('keydown', e => { if(e.key==='Enter') joinRoom(); });
  document.getElementById('nickInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('createBtn').click(); });
  document.getElementById('codeInput').addEventListener('input', e => {
    clearFb();
    const p = e.target.selectionStart;
    e.target.value = e.target.value.toUpperCase();
    e.target.setSelectionRange(p,p);
  });
  document.getElementById('nickInput').addEventListener('input', e => {
    e.target.value = e.target.value.replace(/[^a-zA-Z0-9_]/g,'');
  });

  // QR pre-fill
  const qr = new URLSearchParams(location.search).get('code');
  if (qr) document.getElementById('codeInput').value = qr.toUpperCase();
</script>
</body>
</html>
