<script>
const chatContainer = document.querySelector(".overflow-y-auto");
const input = document.querySelector("input[placeholder*='Whisper']");
const emojiPanel = document.getElementById("emoji-panel");

let replyTo = null;

/* --------------------------
   CREATE MESSAGE ELEMENT
-------------------------- */
function createMessage(text, sender = "me") {
  const wrapper = document.createElement("div");

  if (sender === "me") {
    wrapper.className = "flex flex-col items-end gap-1 ml-auto max-w-[85%] md:max-w-[70%]";
    wrapper.innerHTML = `
      <div class="gradient-bg message-glow p-4 rounded-t-lg rounded-bl-lg text-white">
        ${replyTo ? `<div class="text-xs opacity-70 mb-1">Reply: ${replyTo}</div>` : ""}
        ${text}
      </div>
      <span class="text-[10px] text-outline">${getTime()}</span>
    `;
  } else {
    wrapper.className = "flex gap-3 max-w-[85%] md:max-w-[70%] items-start";
    wrapper.innerHTML = `
      <div class="flex flex-col gap-1">
        <span class="text-[10px] text-on-surface-variant ml-2">Anon</span>
        <div class="glass-panel p-4 rounded-t-lg rounded-br-lg">
          ${text}
        </div>
        <span class="text-[10px] text-outline ml-2">${getTime()}</span>
      </div>
    `;
  }

  wrapper.onclick = () => setReply(text);

  chatContainer.appendChild(wrapper);
  scrollToBottom();

  replyTo = null;
}

/* --------------------------
   SEND MESSAGE
-------------------------- */
function sendMessage() {
  if (!input.value.trim()) return;

  createMessage(input.value, "me");
  input.value = "";

  simulateReply();
}

/* --------------------------
   AUTO REPLY + TYPING
-------------------------- */
function simulateReply() {
  showTyping(true);

  setTimeout(() => {
    showTyping(false);
    createMessage("Encrypted response received.", "them");
  }, 1200);
}

/* --------------------------
   TYPING INDICATOR
-------------------------- */
function showTyping(state) {
  let existing = document.getElementById("typing");

  if (state) {
    if (!existing) {
      const typing = document.createElement("div");
      typing.id = "typing";
      typing.className = "text-xs text-on-surface-variant italic px-4";
      typing.innerText = "Anon is typing...";
      chatContainer.appendChild(typing);
    }
  } else {
    existing && existing.remove();
  }
}

/* --------------------------
   REPLY SYSTEM
-------------------------- */
function setReply(text) {
  replyTo = text;

  let bar = document.getElementById("replyBar");

  if (!bar) {
    bar = document.createElement("div");
    bar.id = "replyBar";
    bar.className = "text-xs bg-surface-container p-2 rounded mb-2";
    input.parentElement.parentElement.insertBefore(bar, input.parentElement);
  }

  bar.innerText = "Replying to: " + text;
}

/* --------------------------
   EMOJI SUPPORT
-------------------------- */
document.querySelectorAll("#emoji-panel button").forEach(btn => {
  btn.addEventListener("click", () => {
    input.value += btn.innerText;
    input.focus();
  });
});

/* --------------------------
   INPUT EVENTS
-------------------------- */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});

/* --------------------------
   HELPERS
-------------------------- */
function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function getTime() {
  const d = new Date();
  return d.getHours() + ":" + d.getMinutes().toString().padStart(2, "0");
}

/* --------------------------
   FIX SEND BUTTON (IMPORTANT)
-------------------------- */
document.querySelectorAll("button").forEach(btn => {
  if (btn.innerText.includes("➤") || btn.innerHTML.includes("send")) {
    btn.onclick = sendMessage;
  }
});
</script>
