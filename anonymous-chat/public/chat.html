<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnonChat вАФ Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(0,255,150,0.05) 0%, transparent 60%);
    }
    .header {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #00ff96, #00c8ff);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .header h2 { font-size: 15px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-count-badge {
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,255,150,0.06);
      border: 1px solid rgba(0,255,150,0.15);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: #00ff96;
      font-weight: 600;
    }
    .user-count-dot {
      width: 7px; height: 7px;
      background: #00ff96;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .room-code {
      font-size: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 5px 12px;
      border-radius: 20px;
      color: #aaa;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 5px;
    }
    .room-code:hover { border-color: rgba(0,255,150,0.4); color: #fff; }
    .room-code span { color: #00ff96; font-weight: 700; letter-spacing: 2px; font-size: 12px; }
    .leave-btn {
      padding: 6px 14px;
      background: transparent;
      color: #ff4f4f;
      border: 1px solid rgba(255,79,79,0.4);
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .leave-btn:hover { background: rgba(255,79,79,0.1); border-color: #ff4f4f; }
    .user-tag {
      text-align: center;
      padding: 7px;
      font-size: 11px;
      color: #333;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center; gap: 12px;
      flex-shrink: 0;
    }
    .user-tag .name span { color: #00ff96; font-weight: 600; }
    .enc-badge {
      display: flex; align-items: center; gap: 4px;
      background: rgba(0,255,150,0.06);
      border: 1px solid rgba(0,255,150,0.15);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      color: #00ff96;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
    .msg { max-width: 75%; display: flex; flex-direction: column; gap: 3px; }
    .msg.me { align-self: flex-end; align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg .meta { font-size: 11px; color: #444; padding: 0 4px; display: flex; align-items: center; gap: 5px; }
    .enc-icon { font-size: 10px; color: #00ff96; opacity: 0.6; }
    .msg .bubble {
      display: inline-block;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      animation: popIn 0.15s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .msg.me .bubble {
      background: linear-gradient(135deg, #00ff96, #00e0aa);
      color: #000;
      border-radius: 16px 16px 4px 16px;
      font-weight: 500;
    }
    .msg.other .bubble {
      background: rgba(255,255,255,0.07);
      color: #eee;
      border-radius: 16px 16px 16px 4px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .file-bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      animation: popIn 0.15s ease;
      max-width: 260px;
    }
    .msg.me .file-bubble {
      background: linear-gradient(135deg, #00ff96, #00e0aa);
      color: #000;
      border-radius: 16px 16px 4px 16px;
    }
    .msg.other .file-bubble {
      background: rgba(255,255,255,0.07);
      color: #eee;
      border-radius: 16px 16px 16px 4px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .file-icon { font-size: 24px; flex-shrink: 0; }
    .file-info { overflow: hidden; }
    .file-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .file-size { font-size: 11px; opacity: 0.6; margin-top: 2px; }
    .img-bubble {
      max-width: 220px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      animation: popIn 0.15s ease;
    }
    .img-bubble img { width: 100%; display: block; border-radius: 12px; }
    .upload-progress {
      font-size: 11px;
      color: #00ff96;
      padding: 4px 8px;
      display: none;
    }
    .system-msg {
      text-align: center;
      font-size: 11px;
      color: #2a2a2a;
      padding: 6px 0;
      display: flex; align-items: center; gap: 8px;
    }
    .system-msg::before, .system-msg::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.04);
    }
    .typing-indicator {
      padding: 0 16px 8px;
      font-size: 12px;
      color: #444;
      height: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .typing-dots { display: flex; gap: 3px; align-items: center; }
    .typing-dots span {
      width: 5px; height: 5px;
      background: #00ff96;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.6;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .input-area {
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 10px 14px;
      flex-shrink: 0;
    }
    .emoji-picker {
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      padding: 10px;
      background: rgba(20,20,30,0.98);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      margin-bottom: 10px;
      max-height: 140px;
      overflow-y: auto;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .emoji-picker.open { display: flex; }
    .emoji-picker::-webkit-scrollbar { width: 3px; }
    .emoji-picker::-webkit-scrollbar-thumb { background: #333; }
    .emoji-btn {
      background: none; border: none;
      font-size: 22px; cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      transition: background 0.15s;
      line-height: 1;
    }
    .emoji-btn:hover { background: rgba(255,255,255,0.1); }
    .input-bar { display: flex; align-items: center; gap: 8px; }
    .emoji-toggle, .file-toggle {
      background: none; border: none;
      font-size: 22px; cursor: pointer;
      padding: 8px; border-radius: 10px;
      transition: background 0.15s;
      line-height: 1; flex-shrink: 0;
    }
    .emoji-toggle:hover, .file-toggle:hover { background: rgba(255,255,255,0.08); }
    .msg-input {
      flex: 1;
      padding: 11px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .msg-input:focus { border-color: rgba(0,255,150,0.35); }
    .msg-input::placeholder { color: #333; }
    .send-btn {
      padding: 10px 18px;
      background: linear-gradient(135deg, #00ff96, #00c8ff);
      color: #000;
      border: none;
      border-radius: 24px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.9; transform: scale(1.03); }
    .send-btn:active { transform: scale(0.97); }
    @media (max-width: 480px) {
      .room-code { display: none; }
      .msg { max-width: 85%; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo-icon">рЯФТ</div>
      <h2>AnonChat</h2>
    </div>
    <div class="header-right">
      <div class="user-count-badge">
        <div class="user-count-dot"></div>
        <span id="userCount">1</span> online
      </div>
      <div class="room-code" onclick="copyCode()" title="Click to copy">
        Room: <span id="roomCodeDisplay">------</span> рЯУЛ
      </div>
      <button class="leave-btn" onclick="leaveRoom()">Leave рЯЪ™</button>
    </div>
  </div>

  <div class="user-tag">
    <div class="name">Chatting as <span id="usernameDisplay"></span></div>
    <div class="enc-badge">рЯФР AES Encrypted</div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="typing-indicator" id="typingIndicator"></div>

  <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)" />

  <div class="input-area">
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="upload-progress" id="uploadProgress">вП≥ Encrypting and sending file...</div>
    <div class="input-bar">
      <button class="emoji-toggle" onclick="toggleEmoji()">рЯШК</button>
      <button class="file-toggle" onclick="document.getElementById('fileInput').click()" title="Send file">рЯУО</button>
      <input class="msg-input" type="text" id="msgInput" placeholder="Type an encrypted message..." onkeydown="handleKey(event)" />
      <button class="send-btn" onclick="sendMessage()">Send вЖС</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const username = sessionStorage.getItem('username');
    const roomCode = sessionStorage.getItem('roomCode');

    if (!username || !roomCode) window.location.href = '/';

    document.getElementById('roomCodeDisplay').textContent = roomCode;
    document.getElementById('usernameDisplay').textContent = username;

    const ENCRYPTION_KEY = 'ANONCHAT_' + roomCode;

    function encrypt(data) {
      return CryptoJS.AES.encrypt(data, ENCRYPTION_KEY).toString();
    }

    function decrypt(cipherText) {
      try {
        const bytes = CryptoJS.AES.decrypt(cipherText, ENCRYPTION_KEY);
        return bytes.toString(CryptoJS.enc.Utf8);
      } catch (e) {
        return null;
      }
    }

    // File handling
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const maxSize = 40 * 1024 * 1024; // 40MB
      if (file.size > maxSize) {
        alert('File is too large! Maximum size is 40MB.');
        event.target.value = '';
        return;
      }

      // Show progress
      const progress = document.getElementById('uploadProgress');
      progress.style.display = 'block';

      const reader = new FileReader();
      reader.onload = function(e) {
        const base64Data = e.target.result;
        const encryptedData = encrypt(base64Data);
        const encryptedName = encrypt(file.name);

        socket.emit('send-file', {
          roomCode,
          username,
          fileName: encryptedName,
          fileType: file.type,
          fileData: encryptedData
        });

        displayFile(username, file.name, file.type, base64Data, 'me');
        progress.style.display = 'none';
      };

      reader.readAsDataURL(file);
      event.target.value = '';
    }

    socket.on('receive-file', ({ username: sender, fileName, fileType, fileData }) => {
      if (sender === username) return;
      const decryptedData = decrypt(fileData);
      const decryptedName = decrypt(fileName);
      if (decryptedData && decryptedName) {
        displayFile(sender, decryptedName, fileType, decryptedData, 'other');
      }
    });

    function displayFile(sender, fileName, fileType, fileData, type) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      const metaLabel = type === 'me' ? 'You' : sender;
      const isImage = fileType.startsWith('image/');

      if (isImage) {
        div.innerHTML = `
          <div class="meta">${metaLabel} <span class="enc-icon">рЯФР</span></div>
          <div class="img-bubble" onclick="downloadFile('${fileData}', '${escapeHTML(fileName)}')">
            <img src="${fileData}" alt="${escapeHTML(fileName)}" />
          </div>
          <div style="font-size:10px;color:#333;padding:2px 4px;">Click to download</div>
        `;
      } else {
        const fileIcon = getFileIcon(fileType);
        const fileSize = getFileSizeFromBase64(fileData);
        div.innerHTML = `
          <div class="meta">${metaLabel} <span class="enc-icon">рЯФР</span></div>
          <div class="file-bubble" onclick="downloadFile('${fileData}', '${escapeHTML(fileName)}')">
            <div class="file-icon">${fileIcon}</div>
            <div class="file-info">
              <div class="file-name">${escapeHTML(fileName)}</div>
              <div class="file-size">${fileSize} ¬Ј Click to download</div>
            </div>
          </div>
        `;
      }

      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function downloadFile(dataUrl, fileName) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = fileName;
      a.click();
    }

    function getFileIcon(fileType) {
      if (fileType.startsWith('image/')) return 'рЯЦЉпЄП';
      if (fileType.startsWith('video/')) return 'рЯОђ';
      if (fileType.startsWith('audio/')) return 'рЯОµ';
      if (fileType.includes('pdf')) return 'рЯУД';
      if (fileType.includes('word') || fileType.includes('document')) return 'рЯУЭ';
      if (fileType.includes('sheet') || fileType.includes('excel')) return 'рЯУК';
      if (fileType.includes('zip') || fileType.includes('rar')) return 'рЯЧЬпЄП';
      return 'рЯУБ';
    }

    function getFileSizeFromBase64(base64) {
      const bytes = (base64.length * 3) / 4;
      if (bytes < 1024) return bytes.toFixed(0) + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // Emoji setup
    const emojis = [
      'рЯША','рЯШВ','рЯШН','рЯ•є','рЯШО','рЯ§Ф','рЯШЕ','рЯ•≤','рЯШ≠','рЯШ°',
      'рЯСН','рЯСО','рЯСП','рЯЩМ','рЯ§Э','рЯТ™','рЯФ•','вЭ§пЄП','рЯТА','вЬЕ',
      'рЯШИ','рЯ§£','рЯШ±','рЯ§ѓ','рЯ•≥','рЯШі','рЯ§Ѓ','рЯ•Є','рЯШЗ','рЯЂ°',
      'рЯР±','рЯРґ','рЯ¶К','рЯРЇ','рЯ¶Б','рЯРѓ','рЯРЄ','рЯРІ','рЯ¶Л','рЯМЯ',
      'рЯТђ','рЯУҐ','рЯФР','рЯФС','рЯЫ°пЄП','вЪ°','рЯТ•','рЯОѓ','рЯЪА','рЯОЙ'
    ];

    const picker = document.getElementById('emojiPicker');
    emojis.forEach(emoji => {
      const btn = document.createElement('button');
      btn.className = 'emoji-btn';
      btn.textContent = emoji;
      btn.onclick = () => insertEmoji(emoji);
      picker.appendChild(btn);
    });

    function toggleEmoji() { picker.classList.toggle('open'); }
    function insertEmoji(emoji) {
      const input = document.getElementById('msgInput');
      input.value += emoji;
      input.focus();
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.emoji-toggle') && !e.target.closest('#emojiPicker')) {
        picker.classList.remove('open');
      }
    });

    socket.emit('join-room', { roomCode, username });

    socket.on('join-success', () => {
      addSystemMessage('You joined as ' + username + ' вАФ messages are AES encrypted рЯФР');
    });

    socket.on('join-error', (msg) => {
      alert(msg);
      window.location.href = '/';
    });

    socket.on('user-joined', (msg) => addSystemMessage(msg));
    socket.on('user-left', (msg) => addSystemMessage(msg));

    socket.on('user-count', (count) => {
      document.getElementById('userCount').textContent = count;
    });

    let typingTimeout;
    const msgInput = document.getElementById('msgInput');
    msgInput.addEventListener('input', () => {
      socket.emit('typing', { roomCode, username });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit('stop-typing', { roomCode });
      }, 1500);
    });

    socket.on('user-typing', (typingUser) => {
      const indicator = document.getElementById('typingIndicator');
      indicator.innerHTML = `
        <div class="typing-dots"><span></span><span></span><span></span></div>
        ${typingUser} is typing...
      `;
    });

    socket.on('user-stop-typing', () => {
      document.getElementById('typingIndicator').innerHTML = '';
    });

    socket.on('receive-message', ({ username: sender, message }) => {
      const decrypted = decrypt(message);
      if (decrypted) addMessage(sender, decrypted, sender === username ? 'me' : 'other');
      document.getElementById('typingIndicator').innerHTML = '';
    });

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const message = input.value.trim();
      if (!message) return;
      const encrypted = encrypt(message);
      socket.emit('send-message', { roomCode, username, message: encrypted });
      socket.emit('stop-typing', { roomCode });
      input.value = '';
      picker.classList.remove('open');
    }

    function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

    function addMessage(sender, message, type) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.innerHTML = `
        <div class="meta">${type === 'me' ? 'You' : sender} <span class="enc-icon">рЯФР</span></div>
        <div class="bubble">${escapeHTML(message)}</div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function addSystemMessage(text) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHTML(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function copyCode() {
      navigator.clipboard.writeText(roomCode);
      alert('Room code copied: ' + roomCode);
    }

    function leaveRoom() {
      sessionStorage.clear();
      window.location.href = '/';
    }
  </script>

</body>
</html>
