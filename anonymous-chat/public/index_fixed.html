<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fixed Index</title>
<style>
html, body {
  height:100%;
  overflow-x:hidden;
  isolation:isolate;
}
.split {
  display:flex;
  height:100%;
  isolation:isolate;
}
.right {
  overflow-x:hidden;
  contain:layout paint;
}
</style>
</head>
<body>
<div class="split">
<div class="left">LEFT</div>
<div class="right">RIGHT</div>
</div>
</body>
</html>
